<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AX CREW</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --accent: #00e5ff;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --border: #1e1e2e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container { max-width: 720px; padding: 60px 24px; text-align: center; }
    .badge {
      display: inline-block;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 4px 12px;
      margin-bottom: 32px;
      text-transform: uppercase;
    }
    h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }
    h1 span { color: var(--accent); }
    p {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
      margin-bottom: 48px;
    }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    .links a {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 10px 20px;
      transition: all 0.2s;
    }
    .links a:hover { color: var(--accent); border-color: var(--accent); }
    footer {
      margin-top: 80px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">AX Automation Platform</div>
    <h1>AX <span>CREW</span></h1>
    <p>AX 관련 자동화 워크플로우를 만들고<br>아이디어를 공유하는 커뮤니티 플랫폼입니다.</p>
    <div class="links">
      <a href="privacy.html">개인정보처리방침</a>
      <a href="terms.html">서비스 이용약관</a>
    </div>
    <footer>© 2025 AX CREW. All rights reserved.</footer>
  </div>
</body>
</html>
